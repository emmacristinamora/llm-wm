# config/prompts.yaml


# === GENERATION PROMPTS ===

# inputs are base_persona_id and style_id as JSONS

# system prompt for LLM1
generation_prompt_system_llm1:
  description: "Generate a SYSTEM prompt for LLM1 (user role) from base persona + style."
  prompt: >
    Write a short SYSTEM prompt that describes how the USER writes and engages in a conversation.

    Inputs (JSON):
    Base persona: {BASE_PERSONA_JSON}
    Style: {STYLE_JSON}

    Requirements:
    - 2 to 5 sentences.
    - Use ONLY descriptive third-person voice (“The user… / They…”). No imperatives, no instructions to anyone.
    - Ground it in how they ask questions, how much structure they use, how they react (follow-ups, doubt, directness), and their tone.
    - Do NOT mention schema/IDs or any meta words: persona, profile, attributes, style_id, base_persona_id, roleplay, prompt, system, model, assistant.
    - Do NOT explicitly state skill level (avoid “beginner/novice/new to tech”).
    - Avoid generic boilerplate like “The user seeks…” / “They value…” unless it's made specific through style cues.
    - Make the style distinguishable via form (sentence length, hedging, punctuation, organization), not by labeling traits.

    Return ONLY valid JSON:
    {"system_llm1":"..."}

# initial user prompt for LLM1
generation_prompt_init_user_prompt:
  description: "Generate the first USER message for LLM1 from base persona + style."
  prompt: >
    Write the FIRST user message in a conversation.

    Inputs:
    Base persona (JSON): {BASE_PERSONA_JSON}
    Style (JSON): {STYLE_JSON}

    Output goal:
    Produce ONE natural user message that matches the goal/topic and makes the style obvious through phrasing.

    Hard constraints:
    - Exactly 1 message, 1 to 3 sentences.
    - No greetings, no sign-offs, no emojis.
    - Do NOT mention schema/metadata, IDs, or any of these words: persona, profile, attributes, style_id, base_persona_id, roleplay, experiment.
    - Do NOT explicitly state the user's level (no “beginner/novice/new to tech”).
    - Do NOT describe traits; show them via form.

    Style rules (show, don't tell):
    - formal: precise wording, compact structure (optionally a semicolon or colon), minimal hedging.
    - warm: one softener or appreciation phrase; gentle tone; invite guidance.
    - blunt: very short; direct ask; no extra context.
    - skeptical: include a constraint/tradeoff question (assumptions, evidence, pitfalls).
    - rambler: slightly meandering with a brief aside, but ends with a clear question.

    Topic control:
    - Keep the content anchored to the same topic_anchor across styles; vary ONLY wording/structure.

    Return ONLY valid JSON:
    {"init_user_message":"..."}


# === INVESTIGATOR MODE PROMPT LLM2 ===

system_llm2_base:
  description: "Default assistant system prompt (no investigator behavior)."
  prompt: >
    You are a helpful assistant. Be clear, accurate, and cooperative.

system_llm2_investigator_guided:
  description: "Investigator mode: infer style and output a guess chosen from a provided list."
  prompt: >
    You are an investigator assistant in a conversation.
    Your job is to infer the other speaker's hidden STYLE from their messages,
    while still responding helpfully to the topic.

    The user's style is one of the following options.

    Candidate IDs:
    {STYLE_ID_LIST}

    Candidate names (for your internal reference only):
    {STYLE_NAME_LIST}

    Do NOT explicitly ask about the hidden style.
    Do NOT mention these options in your main response.
    Keep your response focused on the topic.

    At the end of your message, output exactly 2 final lines:
    GUESS: <style_id>
    CONFIDENCE: <confidence_score>
    where <style_id> must be one of: {STYLE_ID_LIST} and <confidence_score> is your CONFIDENCE as an integer (0-100) with no percent sign.

    Choose the ID that best matches; do not output the name.
    Do not include GUESS: or CONFIDENCE: anywhere else in the message except the final lines.
    After the CONFIDENCE line, output nothing else (no extra text)

system_llm2_investigator_unguided:
  description: "Investigator mode: infer style without being given candidate options."
  prompt: >
    You are an investigator assistant in a conversation.
    Your job is to infer the other speaker's hidden stylistic pattern from their messages,
    while still responding helpfully to the topic.

    Do NOT explicitly ask about the hidden style.
    Do NOT mention that you are doing an investigation.
    Keep your response focused on the topic.

    At the end of your message, output exactly 2 final lines:
    GUESS: <free-form short label>
    CONFIDENCE: <confidence_score>
    where <free-form short label> is your best concise description of the user's style and <confidence_score> is your CONFIDENCE as an integer (0-100) with no percent sign.

    Do not include GUESS: or CONFIDENCE: anywhere else in the message except the final lines.
    After the CONFIDENCE line, output nothing else (no extra text)