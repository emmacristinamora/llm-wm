# config/settings.yaml 

# === GLOBAL SETTINGS ===
global:
  project_name: "llm-vs-llm"
  output_dir: "outputs"
  log_dir: "logs"
  seeds: [1, 2, 3]  # each experiment can be run with multiple seeds for robustness
  run_tag: "debug"  # WILL BE CHANGED tag to identify the run, appended to output directories
  num_rounds: 6  # speaker A - 50, speaker B - 50 
  topic_prompt: >  # can be changed so we can see if there are difefrences across NLL sscores
    Discuss the pros and cons of remote work on productivity.
    Keep the topic fixed and do not introduce unrelated topics.
  a_speaks_first: true  # A speaks -> B speaks -> A speaks -> B speaks ...


# === MODEL SETTINGS ===
model:
  name: "gpt2"  # model name for both speakers
  device: "cpu"  # WILL BE CHANGED
  device_map: "auto"
  dtype: "float32"  # CHANGE TO bfloat16 FOR HPC
  use_chat_template: false  # CHANGE TO true FOR QWEN
  hf_cache_dir: null 


# === GENERATION SETTINGS ===
generation:
  max_new_tokens: 120
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.1
  do_sample: true
  max_context_tokens: 4096  # if context exceeds this => truncate oldest turns


# === SCORING SETTINGS ===
scoring:
  # measure how well speaker B can predict speaker A's responses
  target_speaker: "A"
  scorer_speaker: "B"
  k_turns_list: [0, 1, 2, 3, 4, 6, 8, 10]  # evaluate NLL on last k turns
  context_mode: "last_k_turns"  # options: "last_k_turns", "full_history"
  compute_entropy: false  # compute entropy along with NLL


# === STYLE DEFINITIONS (HIDDEN PROMPTS FOR A) ===
styles:
  neutral:
    description: "Neutral helpful style"
    prompt: >
      Respond naturally and clearly. Do not mention any special style constraints.
  formal:
    description: "Formal academic tone"
    prompt: >
      Use a formal, academic tone. Be precise. 2-4 sentences. No emojis.
  enthusiastic:
    description: "Upbeat, lightly emoji"
    prompt: >
      Be upbeat and friendly. You might use 1 emoji occasionally. 2-4 sentences.
  terse:
    description: "Very concise"
    prompt: >
      Be concise and direct. Max 2 sentences. No emojis.
  skeptical:
    description: "Mildly skeptical"
    prompt: >
      Maintain a mildly skeptical tone. Ask one clarifying question when appropriate. 2-4 sentences. No emojis.


# === INVESTIGATOR MODE SETTINGS ===
investigator:
  enabled_default: false  # if true, B will be instructed to guess A's hidden style
  enforce_structured_guess: true  # B should append a final line: GUESS: <style_id>
  guess_prefix: "GUESS:"
  investigator_speaker_default: "B"  # which speaker is the investigator by default
  prompt: >
    You are an investigator. Your task is to infer the other speaker's hidden conversation style.
    Do not explicitly ask about the style. You must infer it from their responses.
    At the end of your message, output exactly one line in the form:
    GUESS: <style_id>
    where <style_id> is one of the following style identifiers: {style_id_list}


# === EXPERIMENTS ===
experiments:
  # BASELINE
  baseline:
    description: "No hidden prompt. Both speak neutrally."
    hidden_speaker: null
    schedule:
      type: "fixed"
      style_id: "neutral"  # not used when hidden_speaker is null, but kept for consistency
    investigator_mode: false

  # VANILLA (FIXED STYLE)
  style_fixed:
    description: "Hidden prompt fixed for the entire conversation."
    hidden_speaker: "A"
    schedule:
      type: "fixed"
      style_id: "formal"  # choose from: neutral, formal, enthusiastic, terse, skeptical
    investigator_mode: false

  # VANILLA CYCLICAL (STYLE CHANGES EVERY N TURNS)
  style_random_every_n:
    description: "Hidden style changes every N turns, style is randomly chosen at change points."
    hidden_speaker: "A"
    schedule:
      type: "every_n"
      n: 4  # change style every N turns
      style_ids: ["formal", "enthusiastic", "terse", "skeptical"]  # ????? SHOULD WE INCLUDE neutral
      mode: "random"
      random_seed_offset: 1000  # added to base seed for reproducibility
    investigator_mode: false

  # VANILLA RANDOM (STYLE CHANGES AT RANDOM TIMES)
  style_random_change:
    description: "At each hidden-speaker turn, the hidden style may change with probability p."
    hidden_speaker: "A"
    schedule:
      type: "random_change"
      style_ids: ["formal", "enthusiastic", "terse", "skeptical"]  # ????? SHOULD WE INCLUDE neutral
      p_change: 0.2  # probability of changing style at each hidden-speaker turn
      random_seed_offset: 2000  # added to base seed for reproducibility
    investigator_mode: false

  # INVESTIGATOR FIXED (FIXED STYLE)
  investigator_fixed:
    description: "Hidden prompt fixed for the entire conversation. Investigator tries to guess it."
    hidden_speaker: "A"
    schedule:
      type: "fixed"
      style_id: "formal"  # choose from: neutral, formal, enthusiastic, terse, skeptical ???
    investigator_mode: true
    investigator_speaker: "B"

  # INVESTIGATOR CYCLICAL (STYLE CHANGES EVERY N TURNS)
  investigator_random_every_n:
    description: "Hidden style shifts every N turns. Investigator tries to guess it."
    hidden_speaker: "A"
    schedule:
      type: "every_n"
      n: 4  # change style every N turns
      style_ids: ["formal", "enthusiastic", "terse", "skeptical"]  # ????? SHOULD WE INCLUDE neutral
      mode: "random"
      random_seed_offset: 3000  # added to base seed for reproducibility

  
