# synthetic-conversations/config/prompts.yaml


# === GENERATION PROMPTS ===

# inputs are base_persona_id and style_id as JSONS

# system prompt for LLM1
generation_prompt_system_llm1:
  description: "Generate a SYSTEM prompt for LLM1 (user role) from base persona + style."
  prompt: >
    Write a short SYSTEM prompt that controls how YOU (the user) write and engage in a conversation.

    Inputs (JSON):
    Base persona: {BASE_PERSONA_JSON}
    Style: {STYLE_JSON}

    Goal:
    Combine the base persona (what topics/concerns you tend to bring up, typical context, priorities)
    with the style (how you phrase things) into one compact instruction that will make the user's
    messages consistently recognizable.

    Requirements:
    - 5 to 10 sentences total (compact, but specific).
    - Use ONLY second-person voice (“You…”). No first-person (“I”) and no third-person (“the user”).
    - Language: ALWAYS English (American English).
    - Encode STYLE through observable writing habits: message length tendency, pacing, hedging vs directness,
      how you structure requests (constraints, bullets/numbering), how you reference prior turns, tone.
    - Include at least TWO interaction habits (e.g., you ask follow-ups when unclear, challenge assumptions,
      request concrete examples/sanity checks, refine the question iteratively instead of restarting).
    - Keep it about communication behavior and conversational moves; do not list a biography or static traits.
    - Incorporate PERSONA only as lightweight topical tendencies and priorities (e.g., what you care about,
      what kinds of trade-offs you notice), without locking the conversation to one narrow domain.
    - Do NOT bias the user toward writing code, mentioning notebooks/scripts, or giving implementation details
      unless the assistant's previous turn explicitly calls for it.
    - Do NOT mention schema/IDs or any meta words: persona, profile, attributes, style_id, base_persona_id,
      roleplay, prompt, system, model, assistant, experiment.
    - Do NOT explicitly state skill level (avoid “beginner/novice/new to tech”).
    - Avoid generic boilerplate (“You seek…” / “You value…”) unless tied to a concrete linguistic behavior.
    - Prefer 1-3 paragraphs; include at least one constraint or clarifying question per user turn.

    Return ONLY valid JSON:
    {"system_llm1":"..."}

# initial user prompt for LLM1
generation_prompt_init_user_prompt:
  description: "Generate the first USER message for LLM1 from base persona + style."
  prompt: >
    Write the FIRST user message in a conversation.

    Inputs (JSON):
    Base persona: {BASE_PERSONA_JSON}
    Style: {STYLE_JSON}

    Output goal:
    Produce ONE natural first message that feels like the user is initiating a real conversation.
    The message should implicitly reveal the user's style through phrasing, structure, and constraints.

    Hard constraints:
    - Exactly 1 message, written in American English.
    - 3 to 6 sentences (not shorter than 2).
    - No greetings, no sign-offs, no emojis.
    - Do NOT mention schema/metadata, IDs, or any of these words: persona, profile, attributes,
      base_persona_id, roleplay, experiment, system, model, assistant.
    - Do NOT explicitly state the user's skill level (no “beginner/novice/new to tech”).
    - Do NOT describe traits; show them via the way the request is written.
    - Do NOT ask for code or implementation details unless the chosen topic genuinely requires it.

    Content requirements:
    - Choose ONE plausible topic consistent with the base persona's interests (broadly construed), but keep it
      general enough that future turns could branch.
    - Include at least one constraint or evaluation criterion (e.g., “give me 2 options,” “state assumptions,”
      “trade-offs,” “keep it concise but not shallow,” “what would you test/verify?”).
    - Include one probing question that invites the assistant to justify or qualify its recommendation.

    Return ONLY valid JSON:
    {"init_user_message":"..."}


# === INVESTIGATOR MODE PROMPT LLM2 ===

system_llm2:
  description: "Default assistant system prompt (no investigator behavior)."
  prompt: >
    You are a helpful assistant. Be clear, accurate, and cooperative.
    IMPORTANT: Keep your answer concise and complete. Do not exceed ~400 words.