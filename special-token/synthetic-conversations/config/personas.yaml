# synthetic-conversations/config/personas.yaml

# === PERSONA CONFIGURATION (base_persona) ===

base_persona:
  Emma: "I'm Emma, 22, Romanian-American, currently living in Milan and staying closely connected to Romania. I'm doing graduate studies in AI with a math-heavy quantitative background, but I'm especially motivated by language-centered work (NLP, political discourse, media framing) and questions about ethics and societal impact. I'm the oldest of four and I tend to be responsible and future-oriented, so I naturally plan long-term and try to keep things stable and well-structured. Outside academics I'm active in community/volunteering roles and I travel often; I like learning through immersion and real-world constraints rather than purely abstract discussion. I work best when tasks are structured, goal-driven, and reproducible, with clear steps, constraints, and measurable outputs."
  Luiz: "I'm Luiz, 29, Colombian, currently living in Barcelona and staying closely connected to my family back home. I work full-time in operations for a small company and I'm finishing a part-time online degree, so my schedule is tight and I'm constantly balancing work, learning, and health. I have a practical, systems-oriented mindset: I care about what works under constraints, how to measure outcomes, and how to make processes repeatable with minimal overhead. I'm the main financial support for a parent, so I'm naturally risk-aware and I think in terms of trade-offs, opportunity costs, and long-term stability. Outside work I train regularly (running/strength), and I like learning through real-world projects and feedback rather than purely theoretical discussion. I work best when tasks are structured, goal-driven, and reproducible, with clear steps, constraints, and measurable outputs."
  Maria: “I'm Maria, 27, Spanish-Italian, currently living in Berlin and splitting my time between creative work and structured study. I have a background in the humanities and design, and I'm especially drawn to questions about narrative, culture, and how public meaning gets shaped—through media framing, political language, and collective memory. I'm disciplined in a quiet way - I keep routines, track projects carefully, and I prefer decisions that balance long-term sustainability with creative freedom. I travel often for exhibitions, residencies, or collaborations, and I'm used to adapting quickly to new environments while staying anchored to a few core priorities. I work best when tasks have clear constraints and deliverables, but I always ask what the “human cost” or cultural side-effect might be before I commit to a plan.”

# === STYLE CONFIGURATION (style) ===

style:
  SoBasically: "I always write in English (American English), and I'm comfortable using an elevated, precise vocabulary when it helps. I tend to write longer messages that include context, constraints, and what I've already considered; I often reference specific parts of your previous reply to keep the thread coherent. I'm skeptical of vague claims, so I ask for assumptions, edge cases, and concrete examples or sanity checks before I accept an answer. I think iteratively: I refine the question as new details emerge, and I prefer you to respond by updating the plan rather than restarting from scratch. I like structured responses (clear steps, options, trade-offs), but I will push back if structure hides missing reasoning; I usually end with a clear, narrow request for what I want next."
  PickOne: “I write in short, blunt bursts, usually 3 sentences, and I don't add background unless you ask. I care about actionable output fast - a single recommendation, a decision rule, or a checklist. I'm impatient with long explanations, and if your answer feels generic I'll immediately ask for a sharper version with fewer moving parts. I often respond by narrowing scope ("pick one") or imposing a hard constraint (time, budget, risk limit). I rarely use hedging language and I don't want motivational tone — just the best next step.”
  WhatIf: “I write in flowing paragraphs and I think out loud, often using metaphors, imagery, or cultural references to frame what I mean. I care about tone and meaning as much as correctness - I'll ask what a choice signals, what story it tells, or what unintended cultural side-effect it creates. I don't love rigid bullet lists unless they serve a bigger narrative arc; I prefer a few well-chosen options with an explanation of the underlying intuition. I often recap your point in my own words and then pivot with a "what if" scenario or a counterexample. I want answers that feel grounded and human, not purely technical.”

