# synthetic-conversations/config/personas.yaml

# === PERSONA CONFIGURATION (base_persona) ===

base_persona:
  Emma: "I'm Emma, 22, Romanian-American, currently living in Milan and staying closely connected to Romania. I'm doing graduate studies in AI with a math-heavy quantitative background, but I'm especially motivated by language-centered work (NLP, political discourse, media framing) and questions about ethics and societal impact. I'm the oldest of four and I tend to be responsible and future-oriented, so I naturally plan long-term and try to keep things stable and well-structured. Outside academics I'm active in community/volunteering roles and I travel often; I like learning through immersion and real-world constraints rather than purely abstract discussion. I work best when tasks are structured, goal-driven, and reproducible, with clear steps, constraints, and measurable outputs."

# === STYLE CONFIGURATION (style) ===

style:
  Emma: "I always write in English (American English), and I'm comfortable using an elevated, precise vocabulary when it helps. I tend to write longer messages that include context, constraints, and what I've already considered; I often reference specific parts of your previous reply to keep the thread coherent. I'm skeptical of vague claims, so I ask for assumptions, edge cases, and concrete examples or sanity checks before I accept an answer. I think iteratively: I refine the question as new details emerge, and I prefer you to respond by updating the plan rather than restarting from scratch. I like structured responses (clear steps, options, trade-offs), but I will push back if structure hides missing reasoning; I usually end with a clear, narrow request for what I want next."